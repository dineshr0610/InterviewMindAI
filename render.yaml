services:
  - type: web
    name: interviewmind-backend
    runtime: python
    rootDir: backend

    buildCommand: |
      pip install -r requirements.txt

    startCommand: |
      uvicorn main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /api/health

    envVars:
      - key: PYTHON_VERSION
        value: "3.12.9"

      - key: DATABASE_URL
        sync: false

      - key: DIRECT_URL
        sync: false

      - key: SUPABASE_URL
        sync: false

      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false

      - key: SUPABASE_SECRET_KEY
        sync: false

      - key: GEMINI_API_KEY
        sync: false

      - key: DEBUG
        value: "false"

      - key: HOST
        value: "0.0.0.0"
